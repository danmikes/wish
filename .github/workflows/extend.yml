name: Extend PythonAnywhere

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  extend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run extend script
      env:
        PA_USERNAME: ${{ secrets.PA_USER }}
        PA_PASSWORD: ${{ secrets.PA_PASS }}
      run: python extend.py
